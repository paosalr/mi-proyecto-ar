<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>IMAS AR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

</style>

</head>

<body>

<a-scene
mindar-image="imageTargetSrc: ./targets/targets.mind;"
color-space="sRGB"
renderer="colorManagement: true;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: true">

<a-assets>

<img
id="brand"
src="./assets/fondo.png">

</a-assets>

<a-camera
position="0 0 0"
look-controls="false">
</a-camera>

<a-entity mindar-image-target="targetIndex: 0">

<a-image
src="#brand"
position="0 0.4 0"
width="1.7"
height="0.9">
</a-image>

<a-plane
id="websiteBtn"
position="-0.45 -0.45 0"
width="0.7"
height="0.22"
color="#111111">

<a-text
value="Website"
align="center"
color="#FFF"
position="0 0 0.01"
width="2">
</a-text>

</a-plane>

<a-plane
id="whatsappBtn"
position="0.45 -0.45 0"
width="0.7"
height="0.22"
color="#25D366">

<a-text
value="WhatsApp"
align="center"
color="#FFF"
position="0 0 0.01"
width="2">
</a-text>

</a-plane>

</a-entity>

</a-scene>

<script src="./js/app.js"></script>

</body>
</html>
