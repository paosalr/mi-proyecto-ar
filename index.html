<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>IMAS AR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#overlay{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
z-index:9999;
}

#startBtn{
padding:16px 30px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="overlay">
<button id="startBtn">
Iniciar Experiencia AR
</button>
</div>

<a-scene
embedded
arjs="sourceType: webcam;">

<a-assets>

<img
id="brand"
src="assets/fondo.png">

</a-assets>

<a-camera gps-camera rotation-reader></a-camera>

</a-scene>

<script src="js/app.js"></script>

</body>
</html>
