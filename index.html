<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMAS AR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    z-index:9999;
}

#startBtn{
    padding:16px 30px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#actions{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:none;
    gap:15px;
    z-index:9999;
}

.action-btn{
    padding:12px 20px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    color:white;
}

.website{
    background:#111111;
}

.whatsapp{
    background:#25D366;
}
</style>

</head>

<body>

<div id="overlay">
    <button id="startBtn">
        Iniciar Experiencia
    </button>
</div>

<div id="actions">
    <a
        class="action-btn website"
        href="https://www.imas.agency"
        target="_blank">
        Website
    </a>

    <a
        class="action-btn whatsapp"
        href="https://wa.me/524461846064"
        target="_blank">
        WhatsApp
    </a>
</div>

<a-scene>

    <a-assets>
        <img
            id="brand"
            src="assets/fondo.png">
    </a-assets>

    <a-camera position="0 0 0"></a-camera>

</a-scene>

<script src="js/app.js"></script>

</body>
</html>
