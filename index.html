<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Tarjeta</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }

      #botones-ar {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 16px;
        z-index: 9999;
      }

      .btn-ar {
        padding: 14px 28px;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        transition: transform 0.15s, opacity 0.15s;
        -webkit-tap-highlight-color: transparent;
      }

      .btn-ar:active {
        transform: scale(0.95);
        opacity: 0.85;
      }

      .btn-web {
        background: #1a1a1a;
        color: #ffffff;
      }

      .btn-whatsapp {
        background: #25D366;
        color: #ffffff;
      }

      /* Instrucción inicial para el usuario */
      #instruccion {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 10px 20px;
        border-radius: 50px;
        font-size: 14px;
        font-family: sans-serif;
        z-index: 9999;
        white-space: nowrap;
        pointer-events: none;
      }
    </style>
  </head>

  <body>

    <!-- Mensaje de instrucción -->
    <div id="instruccion">📷 Apunta la cámara al código QR de la tarjeta</div>

    <a-scene
      embedded
      arjs="sourceType: webcam;
            detectionMode: mono_and_matrix;
            matrixCodeType: 3x3;
            debugUIEnabled: false;
            trackingMethod: best;"
      renderer="logarithmicDepthBuffer: true; antialias: true;"
      vr-mode-ui="enabled: false"
    >
      <a-assets>
        <!-- ✏️ Cambia imagen.png por el nombre de tu archivo -->
        <img id="mi-imagen" src="assets/imagen.png" crossorigin="anonymous" />
      </a-assets>

      <!--
        barcode value="1" corresponde al QR que vas a generar.
        El generador de QR de abajo crea un QR con el número 1 como valor de matriz.
        Ese mismo QR es el que imprimes en la tarjeta.
      -->
      <a-marker type="barcode" value="1">

        <!-- Imagen flotando sobre el QR -->
        <!-- Ajusta width/height según proporciones de tu imagen -->
        <!-- position y=0.5 = altura sobre la tarjeta -->
        <a-image
          src="#mi-imagen"
          position="0 0.5 0"
          width="3.5"
          height="2"
          rotation="-90 0 0"
          animation="property: position;
                     from: 0 0.3 0;
                     to: 0 0.5 0;
                     dur: 800;
                     easing: easeOutQuad"
        ></a-image>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <div id="botones-ar">
      <!-- ✏️ Cambia por tu URL real -->
      <button
        class="btn-ar btn-web"
        onclick="window.open('https:www.imas.agency', '_blank')"
      >
        🌐 Visitar sitio
      </button>

      <!-- ✏️ Cambia 521XXXXXXXXXX por tu número con código de país -->
      <button
        class="btn-ar btn-whatsapp"
        onclick="window.open('https:wa.me/5214461846064?text=Hola%2C%20vi%20tu%20tarjeta%20F0%9F%94%A5', '_blank')"
      >
        💬 WhatsApp
      </button>
    </div>

    <script>
      // Oculta la instrucción cuando detecta el marcador
      document.querySelector('a-scene').addEventListener('markerFound', function () {
        document.getElementById('instruccion').style.opacity = '0';
      });

      document.querySelector('a-scene').addEventListener('markerLost', function () {
        document.getElementById('instruccion').style.opacity = '1';
      });
    </script>

  </body>
</html>
